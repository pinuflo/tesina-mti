<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-lg-7">

      <!-- Confirmación enviado -->
      <div class="card border-success" *ngIf="sent">
        <div class="card-body text-center py-5">
          <i class="fas fa-check-circle fa-4x text-success mb-3"></i>
          <h4 class="text-success">¡Mensaje enviado!</h4>
          <p class="text-muted mb-4">Gracias por tu contacto. Responderemos a la brevedad.</p>
          <button class="btn btn-outline-success" (click)="resetForm()">
            <i class="fas fa-plus me-1"></i>Enviar otro mensaje
          </button>
        </div>
      </div>

      <!-- Formulario -->
      <div class="card" *ngIf="!sent">
        <div class="card-header">
          <h5 class="mb-0">
            <i class="fas fa-envelope me-2 text-primary"></i>
            Contacto
          </h5>
        </div>
        <div class="card-body">
          <p class="text-muted mb-4">¿Tienes dudas sobre el estudio o el sistema? Completa el formulario y nos pondremos en contacto.</p>

          <form class="row g-3" (ngSubmit)="enviar()">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
              <input type="text" class="form-control"
                     [(ngModel)]="form.nombre" name="nombre"
                     placeholder="Tu nombre"
                     [class.is-invalid]="submitted && !form.nombre.trim()">
              <div class="invalid-feedback">El nombre es obligatorio.</div>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
              <input type="email" class="form-control"
                     [(ngModel)]="form.email" name="email"
                     placeholder="tu@email.com"
                     [class.is-invalid]="submitted && !form.email.trim()">
              <div class="invalid-feedback">El email es obligatorio.</div>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Asunto</label>
              <input type="text" class="form-control"
                     [(ngModel)]="form.asunto" name="asunto"
                     placeholder="¿De qué trata tu mensaje? (opcional)">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Mensaje <span class="text-danger">*</span></label>
              <textarea class="form-control" rows="5"
                        [(ngModel)]="form.mensaje" name="mensaje"
                        placeholder="Escribe tu consulta o comentario aquí..."
                        [class.is-invalid]="submitted && !form.mensaje.trim()"></textarea>
              <div class="invalid-feedback">El mensaje es obligatorio.</div>
            </div>
            <div class="col-12 d-flex justify-content-end gap-2">
              <button type="button" class="btn btn-outline-secondary" (click)="resetForm()">Limpiar</button>
              <button type="submit" class="btn btn-primary">
                <i class="fas fa-paper-plane me-1"></i>Enviar mensaje
              </button>
            </div>
          </form>
        </div>
      </div>

    </div>
  </div>
</div>

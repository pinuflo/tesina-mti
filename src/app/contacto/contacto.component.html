<h2>Contacto</h2>
<form>
  <div class="mb-3">
    <label for="contactEmail" class="form-label">Email</label>
    <input type="email" class="form-control" id="contactEmail" placeholder="tuemail@ejemplo.com">
  </div>
  <div class="mb-3">
    <label for="contactMsg" class="form-label">Mensaje</label>
    <textarea class="form-control" id="contactMsg" rows="3"></textarea>
  </div>
  <button type="submit" class="btn btn-success">Enviar</button>
</form>

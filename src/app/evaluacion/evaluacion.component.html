<h2>Evaluación de Paciente</h2>
<form class="row g-3">
  <div class="col-md-4">
    <label class="form-label">Peso (kg)</label>
    <input type="number" class="form-control" value="70">
  </div>
  <div class="col-md-4">
    <label class="form-label">Talla (cm)</label>
    <input type="number" class="form-control" value="170">
  </div>
  <div class="col-md-4">
    <label class="form-label">IMC</label>
    <input type="text" class="form-control" value="24.2" readonly>
  </div>
  <div class="col-12">
    <label class="form-label">Historia Clínica</label>
    <textarea class="form-control" rows="2">Sin antecedentes relevantes.</textarea>
  </div>
  <div class="col-12">
    <button type="submit" class="btn btn-primary">Guardar Evaluación</button>
  </div>
</form>
